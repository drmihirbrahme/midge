name: ci
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: pip install numpy
      - name: build
        run: make
      - name: validate C engine (vs NumPy reference, all dtypes)
        run: make test
      - name: validate OpenAI-compatible server
        run: pip install tokenizers openai && make test-server
  test-mlx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: pip install numpy "mlx[cpu]" tokenizers openai
      - name: build
        run: make
      - name: validate MLX engine (CPU backend, all dtypes)
        run: make test-mlx
      - name: validate OpenAI server on the MLX backend
        run: python3 tools/validate_server.py --backend mlx
